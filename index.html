<!DOCTYPE html>
<html>
<head>
    <title>AiVault Enterprise</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 2s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { background: #0078d4; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #output { margin-top: 20px; padding: 15px; background: #e9ecef; border-left: 5px solid #0078d4; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛡️ AiVault</h2>
        <p>Upload a PDF to start chatting with your data.</p>
        
        <input type="file" id="pdfInput" accept="application/pdf">
        <button id="uploadBtn" onclick="upload()">Upload & Index</button>
        <div id="uploadLoader" class="loader"></div>
        
        <hr style="margin: 25px 0;">
        
        <input type="text" id="queryInput" placeholder="Ask a question..." style="width: 70%; padding: 8px;">
        <button id="askBtn" onclick="ask()">Ask</button>
        <div id="askLoader" class="loader"></div>

        <div id="output"></div>
    </div>

    <script>
        const API = "http://localhost:5000";

        async function upload() {
            const file = document.getElementById('pdfInput').files[0];
            if (!file) return alert("Select a file!");

            toggle('upload', true);
            const formData = new FormData();
            formData.append("file", file);

            await fetch(`${API}/upload`, { method: 'POST', body: formData });
            toggle('upload', false);
            alert("Document indexed!");
        }

        async function ask() {
    const q = document.getElementById('queryInput').value;
    if (!q) return alert("Enter a question!");
    
    const outputDiv = document.getElementById('output');
    outputDiv.style.display = 'block';
    outputDiv.innerText = "Thinking..."; // Show immediate feedback
    toggle('ask', true);

    try {
        const res = await fetch(`${API}/chat?query=${encodeURIComponent(q)}`, { method: 'POST' });
        let data = await res.json();
        
        // If 'data' is still a string (Double Serialization), parse it again
        if (typeof data === 'string') {
            data = JSON.parse(data);
        }

        console.log("Final Decoded Data:", data); // Check your F12 Console for this!

        if (data && data.answer) {
            outputDiv.innerText = data.answer;
        } else {
            outputDiv.innerText = "Error: The Brain returned data, but no 'answer' property was found.";
        }
    } catch (err) {
        outputDiv.innerText = "Error: Could not connect to the Gateway. Is the .NET app running?";
        console.error(err);
    } finally {
        toggle('ask', false);
    }
}

        function toggle(type, loading) {
            document.getElementById(`${type}Btn`).disabled = loading;
            document.getElementById(`${type}Loader`).style.display = loading ? 'inline-block' : 'none';
        }
    </script>
</body>
</html>
